name: make test
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  maketest:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: make test
